version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: taskmanager_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: taskmanager_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/taskmanager?schema=public"
      JWT_SECRET: "fzaOvsR26XJv/dvgmaqIwBisRAltCBCIN+AdVUunQ3c="

volumes:
  postgres_data: